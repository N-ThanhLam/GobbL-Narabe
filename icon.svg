<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="GobbL-Narabe">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1124"/>
      <stop offset="0.55" stop-color="#0a0e1f"/>
      <stop offset="1" stop-color="#060810"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4d985"/>
      <stop offset="0.5" stop-color="#d8b44e"/>
      <stop offset="1" stop-color="#a9842f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#4493f8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4493f8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- maskable: 全面背景（セーフゾーンは中央80%） -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>

  <!-- 盤面パネル（中央セーフゾーン内 ~360px） -->
  <g transform="translate(76 76)">
    <rect x="0" y="0" width="360" height="360" rx="44" fill="#121627" stroke="url(#gold)" stroke-width="4"/>
    <!-- 4x4 グリッド -->
    <g stroke="#2a3354" stroke-width="3" stroke-linecap="round">
      <line x1="120" y1="48" x2="120" y2="312"/>
      <line x1="180" y1="48" x2="180" y2="312"/>
      <line x1="240" y1="48" x2="240" y2="312"/>
      <line x1="48"  y1="120" x2="312" y2="120"/>
      <line x1="48"  y1="180" x2="312" y2="180"/>
      <line x1="48"  y1="240" x2="312" y2="240"/>
    </g>
    <!-- 重ねた駒（大→小：隠して読み合う＝ゲームの核） -->
    <circle cx="180" cy="180" r="96" fill="url(#gold)"/>
    <circle cx="180" cy="180" r="60" fill="#e5484d"/>
    <circle cx="180" cy="180" r="30" fill="#4493f8"/>
  </g>
</svg>
